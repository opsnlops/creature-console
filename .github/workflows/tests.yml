name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  swift-package-tests:
    name: Swift Package Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Common library tests
        working-directory: Common
        run: swift test

  xcode-tests:
    name: Xcode Tests
    runs-on: macos-latest

    strategy:
      matrix:
        destination:
          - platform=macOS
          - platform=iOS Simulator,name=iPhone 16 Pro

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: |
          xcodebuild test \
            -project "Creature Console.xcodeproj" \
            -scheme "Creature Console" \
            -destination "${{ matrix.destination }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
