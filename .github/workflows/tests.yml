name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  swift-package-tests:
    name: Swift Package Tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Common library tests
        working-directory: Common
        run: swift test

  xcode-tests:
    name: Xcode Tests
    # The app targets macOS 26 / iOS 26, so native macOS tests need a macOS 26 host
    # (macos-latest is still macOS 15 mid-migration and can't run a macOS 26 test bundle).
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        platform: [macOS, iOS]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve test destination
        id: dest
        run: |
          if [ "${{ matrix.platform }}" = "macOS" ]; then
            echo "destination=platform=macOS" >> "$GITHUB_OUTPUT"
          else
            # Pre-installed simulator device names vary by runner image, so pick an
            # available iPhone by UDID instead of hardcoding a model that may not exist.
            udid=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
            if [ -z "$udid" ]; then
              echo "No available iPhone simulator found" >&2
              xcrun simctl list devices available >&2
              exit 1
            fi
            echo "Using iPhone simulator $udid"
            echo "destination=platform=iOS Simulator,id=$udid" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: |
          xcodebuild test \
            -project "Creature Console.xcodeproj" \
            -scheme "Creature Console" \
            -destination "${{ steps.dest.outputs.destination }}" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
